<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mental Health - AI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/chat.css">
</head>

<body>
  <div id="header"></div>
  <!-- ===== MAIN CONTENT ===== -->
  <main class="main">
    <div class="container">
      <section class="ai-chat-section">
        <h1>AI Chat Support</h1>
        <p>Talk anytime. We’re here to listen and help you feel better.</p>

        <div class="chat-box card">
          <div class="chat-messages" id="chat-messages">
            <div class="message ai">
              Hi there 👋 I'm here to support you. How are you feeling today?
            </div>
          </div>

          <div class="chat-input-area">
            <input type="text" class="chat-input" id="chat-input" placeholder="Type your message..." />
            <button class="btn-primary send-btn" id="send-btn">Send</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="footer"></div>

  <!-- ===== CHATBOT SCRIPT ===== -->
  <script>
    const messagesContainer = document.getElementById("chat-messages");
    const input = document.getElementById("chat-input");
    const sendBtn = document.getElementById("send-btn");

    async function sendMessage() {
      const userText = input.value.trim();
      if (!userText) return;

      // Show user message
      appendMessage(userText, "user");
      input.value = "";

      // Call AI API (replace with your backend endpoint)
      appendMessage("Thinking...", "ai");
      const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
      if (!token) {
        window.location.href = 'Login.html';
        return;
      }

      const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? (window.location.port === '5000' ? '' : 'http://localhost:5000') : '';
      try {
        const response = await fetch(`${API_BASE_URL}/api/chat`, { // your backend endpoint
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ message: userText })
        });
        const data = await response.json();

        // Remove "Thinking..." and add actual reply
        messagesContainer.lastChild.remove();
        appendMessage(data.reply || "Sorry, I couldn’t process that.", "ai");
      } catch (err) {
        messagesContainer.lastChild.remove();
        appendMessage("⚠️ Error connecting to AI service.", "ai");
      }
    }

    function appendMessage(text, sender) {
      const msg = document.createElement("div");
      msg.classList.add("message", sender);
      msg.textContent = text;
      messagesContainer.appendChild(msg);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
  <script src="scripts/layout.js"></script>
  <script src="scripts/auth.js"></script>
</body>

</html>
